<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <title>Update Wellheader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {} }
    }
  </script>
</head>
<body class="bg-gray-900 text-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-gray-800 shadow-lg rounded-lg p-8 w-full max-w-lg border border-gray-700">
    <div class="flex items-center justify-between mb-6">
      <a href="/" class="text-sm text-blue-400 hover:text-blue-300">&larr; Back to service selection</a>
      <span class="text-xs uppercase tracking-[0.2em] text-gray-400">Service</span>
    </div>
    <h1 class="text-2xl font-bold text-center text-gray-100 mb-2">Update Wellheader</h1>
    <p class="text-center text-gray-400 mb-6 text-sm">Uploads always use the WELLHEADER sheet; no sheet selection is needed.</p>

    {% if message %}
      <div class="bg-blue-900 border border-blue-600 text-blue-200 p-3 rounded mb-4">
        {{ message }}
      </div>
    {% endif %}

    <form action="/wellheader/process" method="post" enctype="multipart/form-data" class="space-y-4">
      <div>
        <label class="block text-gray-300 font-medium mb-1">Company:</label>
        <select name="company" class="w-full bg-gray-900 border border-gray-700 rounded p-2 focus:outline-none focus:ring focus:ring-blue-500" required>
          <option value="">-- Select a company --</option>
          <option>Akakus</option>
          <option>Apache</option>
          <option>Blackbeard</option>
          <option>Browning</option>
          <option>Chord</option>
          <option>Cholla</option>
          <option>COP</option>
          <option>CPX</option>
          <option>Coterra</option>
          <option>Crownquest</option>
          <option>Double Eagle</option>
          <option>Endeavor</option>
          <option>Firebird</option>
          <option>Four Point</option>
          <option>Iron Orchard</option>
          <option>Mewbourne</option>
          <option>Moriah</option>
          <option>Novo</option>
          <option>Permian</option>
          <option>Point</option>
          <option>Rockport</option>
          <option>Sixess</option>
          <option>SOGC</option>
          <option>Stephens</option>
          <option>Sirteoil</option>
          <option>Titus</option>
          <option>TRP</option>
          <option>Upwing</option>
          <option>VFPetroleum</option>
          <option>Vital</option>
        </select>
      </div>

      <div>
        <label class="block text-gray-300 font-medium mb-1">Excel file:</label>
        <input type="file" name="file" accept=".xlsx" class="w-full text-gray-100 bg-gray-900 border border-gray-700 rounded p-2" required />
      </div>

      <div class="text-center">
        <button type="submit" class="bg-emerald-600 text-white font-medium px-4 py-2 rounded hover:bg-emerald-700 transition">
          Process
        </button>
      </div>
    </form>
  </div>
</body>
</html>
