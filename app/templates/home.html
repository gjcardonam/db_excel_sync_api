<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Excel Sync</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: { extend: {} }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 flex items-center justify-center p-6">
  <main class="w-full max-w-2xl">
    <header class="mb-10 text-center">
      <p class="text-xs font-medium uppercase tracking-[0.3em] text-blue-300/80 mb-3">Excel Sync</p>
      <h1 class="text-3xl font-bold text-gray-50">Select a service</h1>
    </header>

    <div class="space-y-6">
      <!-- Install Report (standalone) -->
      <a href="/well-configuration"
         class="group flex items-center gap-4 rounded-xl border border-gray-700/70 bg-gray-800/50 p-4 shadow-sm transition hover:border-blue-500/70 hover:bg-gray-800 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-500">
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-blue-500/10 text-blue-400 ring-1 ring-inset ring-blue-500/25 transition group-hover:bg-blue-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
        </span>
        <h2 class="text-base font-semibold text-gray-100">Upload Install Report</h2>
        <span class="ml-auto text-gray-600 transition group-hover:translate-x-0.5 group-hover:text-blue-400">&rarr;</span>
      </a>

      <!-- Wellheader group -->
      <section>
        <h2 class="mb-3 text-xs font-semibold uppercase tracking-[0.15em] text-gray-500">Wellheader</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Insert -->
          <a href="/wellheader-insert"
             class="group flex items-center gap-4 rounded-xl border border-gray-700/70 bg-gray-800/50 p-4 shadow-sm transition hover:border-cyan-500/70 hover:bg-gray-800 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-500">
            <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-cyan-500/10 text-cyan-400 ring-1 ring-inset ring-cyan-500/25 transition group-hover:bg-cyan-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
              </svg>
            </span>
            <h3 class="text-base font-semibold text-gray-100">Insert Wellheader</h3>
            <span class="ml-auto text-gray-600 transition group-hover:translate-x-0.5 group-hover:text-cyan-400">&rarr;</span>
          </a>

          <!-- Update -->
          <a href="/wellheader"
             class="group flex items-center gap-4 rounded-xl border border-gray-700/70 bg-gray-800/50 p-4 shadow-sm transition hover:border-emerald-500/70 hover:bg-gray-800 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-emerald-500">
            <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-emerald-500/10 text-emerald-400 ring-1 ring-inset ring-emerald-500/25 transition group-hover:bg-emerald-500/20">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
              </svg>
            </span>
            <h3 class="text-base font-semibold text-gray-100">Update Wellheader</h3>
            <span class="ml-auto text-gray-600 transition group-hover:translate-x-0.5 group-hover:text-emerald-400">&rarr;</span>
          </a>
        </div>
      </section>

      <!-- Production (standalone) -->
      <a href="/production"
         class="group flex items-center gap-4 rounded-xl border border-gray-700/70 bg-gray-800/50 p-4 shadow-sm transition hover:border-purple-500/70 hover:bg-gray-800 hover:shadow-md focus:outline-none focus-visible:ring-2 focus-visible:ring-purple-500">
        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-purple-500/10 text-purple-400 ring-1 ring-inset ring-purple-500/25 transition group-hover:bg-purple-500/20">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" />
          </svg>
        </span>
        <h2 class="text-base font-semibold text-gray-100">Upload Production</h2>
        <span class="ml-auto text-gray-600 transition group-hover:translate-x-0.5 group-hover:text-purple-400">&rarr;</span>
      </a>
    </div>
  </main>
</body>
</html>
